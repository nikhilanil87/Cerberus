<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cerberus — Authenticating...</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Pixelify+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0d0f1a;
  --surface: #131625;
  --border:  #1e2540;
  --border2: #2a3460;
  --text:    #d8e8ff;
  --muted:   #7a9ab8;
  --accent:  #f5c518;
  --cyan:    #00e5ff;
  --green:   #00ff88;
  --red:     #ff3355;
  --pixel:   'Press Start 2P', monospace;
  --display: 'Pixelify Sans', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--display);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(245,197,24,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,197,24,0.025) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,0.06) 0px, transparent 1px, transparent 3px);
  pointer-events: none;
  z-index: 1;
}

@keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
@keyframes spin  { to { transform: rotate(360deg); } }
@keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

.card {
  position: relative;
  z-index: 2;
  background: var(--surface);
  border: 2px solid var(--border2);
  border-bottom: 5px solid rgba(0,0,0,0.8);
  box-shadow: 8px 8px 0 rgba(0,0,0,0.8);
  padding: 2.5rem 2.8rem;
  width: 420px;
  animation: slideUp 0.3s steps(6);
  text-align: center;
}

.logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 2rem;
}

.logo-icon {
  width: 32px; height: 32px;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: #1a0a00;
  border: 2px solid #8b6800;
  border-bottom: 3px solid #5a4200;
  box-shadow: 2px 2px 0 rgba(0,0,0,0.7);
  font-family: var(--pixel);
  font-weight: bold;
  flex-shrink: 0;
}

.logo-name {
  font-family: var(--pixel);
  font-size: 0.6rem;
  color: var(--accent);
  letter-spacing: 0.06em;
}

.spinner-wrap {
  margin: 0 auto 1.6rem;
  width: 48px; height: 48px;
  position: relative;
}

.spinner-outer {
  width: 48px; height: 48px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  animation: spin 1s linear infinite;
}

.spinner-inner {
  position: absolute;
  top: 8px; left: 8px;
  width: 32px; height: 32px;
  border: 2px solid var(--border);
  border-bottom-color: var(--cyan);
  animation: spin 0.6s linear infinite reverse;
}

.status-label {
  font-family: var(--pixel);
  font-size: 0.48rem;
  color: var(--accent);
  letter-spacing: 0.08em;
  line-height: 2;
  margin-bottom: 0.6rem;
}

.status-label::after {
  content: '';
  display: inline-block;
  animation: blink 0.9s step-end infinite;
  margin-left: 2px;
  color: var(--accent);
}

.sub {
  font-family: var(--display);
  font-size: 0.85rem;
  color: var(--muted);
  line-height: 1.7;
}

.divider {
  height: 2px;
  background: var(--border);
  margin: 1.6rem 0;
}

.steps {
  display: flex;
  flex-direction: column;
  gap: 8px;
  text-align: left;
}

.step {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--display);
  font-size: 0.82rem;
  color: var(--muted);
}

.step-dot {
  width: 8px; height: 8px;
  flex-shrink: 0;
  background: var(--border2);
}

.step.done .step-dot  { background: var(--green); box-shadow: 0 0 4px var(--green); }
.step.done            { color: var(--text); }
.step.active .step-dot { background: var(--accent); animation: blink 0.8s step-end infinite; }
.step.active          { color: var(--accent); }

.err-box {
  display: none;
  margin-top: 1.2rem;
  padding: 10px 12px;
  background: rgba(255,51,85,0.07);
  border: 2px solid var(--red);
  border-left: 4px solid var(--red);
  color: var(--red);
  font-family: var(--display);
  font-size: 0.85rem;
  line-height: 1.7;
  text-align: left;
}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">**</div>
    <div class="logo-name">CERBERUS</div>
  </div>

  <div class="spinner-wrap">
    <div class="spinner-outer"></div>
    <div class="spinner-inner"></div>
  </div>

  <div class="status-label" id="statusLabel">AUTHENTICATING</div>
  <div class="sub" id="statusSub">Verifying identity with Auth0...</div>

  <div class="divider"></div>

  <div class="steps">
    <div class="step done"  id="step1"><div class="step-dot"></div><span>Token received from Auth0</span></div>
    <div class="step active" id="step2"><div class="step-dot"></div><span>Storing session server-side</span></div>
    <div class="step"       id="step3"><div class="step-dot"></div><span>Redirecting to dashboard</span></div>
  </div>

  <div class="err-box" id="errBox"></div>
</div>

<script>
(async function() {
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const token = params.get('access_token');
  const state = params.get('state'); // ── ADD THIS: Extract the state ──
  const error = params.get('error');

  function setStatus(label, sub) {
    document.getElementById('statusLabel').textContent = label;
    document.getElementById('statusSub').textContent = sub;
  }

  function setStep(active) {
    ['step1','step2','step3'].forEach((id, i) => {
      const el = document.getElementById(id);
      el.className = 'step' + (i + 1 < active ? ' done' : i + 1 === active ? ' active' : '');
    });
  }

  function showError(msg) {
    const box = document.getElementById('errBox');
    box.textContent = msg;
    box.style.display = 'block';
    document.querySelector('.spinner-wrap').style.opacity = '0.3';
    setStatus('AUTH FAILED', 'See error below.');
  }

  if (error) {
    showError('Auth error: ' + params.get('error_description'));
    return;
  }

  if (!token) {
    showError('No token found in callback.');
    setTimeout(() => window.location.href = '/', 2000);
    return;
  }

  // Persist access token for API calls from frontend and session storage
  localStorage.setItem('access_token', token);

  // Send token AND state to backend to store in session
  setStep(2);
  const resp = await fetch('/auth/store-token', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      access_token: token,
      state: state // ── ADD THIS: Tell the backend if this was an MFA step-up ──
    })
  });

  if (resp.ok) {
    // If we just finished an MFA flow, we can also set a flag here for the dashboard
    if (state === 'mfa_stepup') {
      console.log("MFA Step-up detected in callback");
    }
    setStep(3);
    setStatus('ACCESS GRANTED', 'Loading dashboard...');
    setTimeout(() => window.location.href = '/dashboard', 400);
  } else {
    showError('Failed to store token. Redirecting...');
    setTimeout(() => window.location.href = '/', 2000);
  }
})();
</script>
</body>
</html>
